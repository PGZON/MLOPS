apiVersion: apps/v1
kind: Deployment
metadata:
  name: car-model
spec:
  replicas: 1
  selector:
    matchLabels:
      app: car-model
  template:
    metadata:
      labels:
        app: car-model
    spec:
      containers:
      - name: car-model
        image: prathamesh0505/mlops:v1
        imagePullPolicy: Always
        ports:
        - containerPort: 8000